<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>RDS Viewer & Editor v1.5.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg:        #f3f4f6;      
      --surface:   #ffffff;      
      --surface2:  #e5e7eb;      
      --border:    #d1d5db;      
      --ink:       #111827;      
      --muted:     #6b7280;      
      --blue:      #1d4ed8;      
      --blue-dim:  #dbeafe;
      --green:     #166534;      
      --green-dim: #dcfce7;
      --red:       #b91c1c;
      --red-dim:   #fee2e2;
      
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg); color: var(--ink); font-family: var(--sans);
      height: 100%; margin: 0; padding: 0;
      display: flex; flex-direction: column; overflow: hidden;
      min-width: 380px; 
    }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap; 
    }

    .header-title { flex: 1; min-width: 150px; }
    .header-title h1 { font-size: 16px; font-weight: 700; color: var(--ink); display: flex; align-items: center; gap: 8px; }
    .header-title h1 .version { font-family: var(--mono); font-size: 11px; font-weight: normal; color: var(--muted); background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
    .header-title p { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

    .badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }

    .btn { font-family: var(--sans); font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 6px; border: none; cursor: pointer; transition: opacity .15s, transform .1s; white-space: nowrap; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: .85; }
    .btn:not(:disabled):active { transform: scale(.97); }
    
    .btn-primary { background: var(--blue); color: #ffffff; }
    .btn-success { background: var(--green); color: #ffffff; }
    .btn-danger { background: var(--surface2); color: var(--red); border: 1px solid var(--border); }

    #editPanel { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .input-field { font-family: var(--mono); font-size: 12px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; width: 140px; }

    #statusBar { font-family: var(--mono); font-size: 11px; padding: 6px 16px; background: var(--blue-dim); color: var(--blue); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #statusBar.ok    { background: var(--green-dim); color: var(--green); }
    #statusBar.error { background: var(--red-dim);   color: var(--red); }
    #statusBar.warn  { background: #fef08a; color: #854d0e; }

    main { flex: 1 1 auto; overflow-y: auto; padding: 16px; height: 0; }

    .tree-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 12px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .tree-node { margin-left: 14px; position: relative; }
    .tree-node::before { content: ""; position: absolute; top: 0; left: -8px; bottom: 0; border-left: 1px solid var(--border); }
    .tree-node:last-child::before { bottom: auto; height: 16px; }
    
    .tree-header { display: flex; align-items: center; padding: 6px 8px; cursor: pointer; border-radius: 6px; transition: background 0.1s; margin-top: 2px; user-select: none; }
    .tree-header:hover { background: var(--bg); }
    
    .tree-arrow { font-size: 10px; color: var(--muted); width: 16px; text-align: center; margin-right: 4px; }
    .tree-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-count { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); margin-left: 8px; }
    
    .tree-children { display: none; }
    
    .tree-object { display: flex; align-items: center; margin-left: 14px; padding: 6px 8px 6px 28px; font-size: 12px; color: var(--ink); cursor: pointer; transition: background 0.1s; border-radius: 4px; position: relative; margin-top: 2px; }
    .tree-object::before { content: ""; position: absolute; top: 0; left: -8px; bottom: auto; height: 16px; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); width: 12px; }
    .tree-object:hover { background: var(--blue-dim); color: var(--blue); }
    .tree-object::after { content: "🧊"; position: absolute; left: 10px; font-size: 10px; }

    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink); }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:none; }
    }
    .anim { animation: fadeUp .3s ease both; }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>RDS Viewer <span class="version">v1.5.1</span></h1>
    <p>Hierarkisk visning & Batch-editering (m/ ObjID)</p>
  </div>
  <span class="badge" id="modelBadge">Frakoblet</span>
  <button class="btn btn-primary" id="scanBtn" disabled>▶ Bygg RDS-tre</button>
</header>

<div id="editPanel">
  <input type="text" id="newRunningNumber" class="input-field" placeholder="Nytt løp.nr (eks: 04)">
  <button class="btn btn-primary" id="queueBtn" disabled>➕ Legg til i kø</button>
  <div style="flex-grow: 1;"></div>
  <button class="btn btn-danger" id="clearBtn" disabled>Tøm</button>
  <button class="btn btn-success" id="exportBtn" disabled>💾 Eksporter (0)</button>
</div>

<div id="statusBar">Kobler til Trimble Connect...</div>

<main id="mainContent">
  <div class="empty anim">Klikk på "Bygg RDS-tre" for å skanne modellene.</div>
</main>

<script>
let API = null;
let EXPORT_QUEUE = [];

const $ = id => document.getElementById(id);
const setStatus = (m, c='') => { $('statusBar').textContent = m; $('statusBar').className = c; };

function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

async function connect(){
  try {
    API = await window.TrimbleConnectWorkspace.connect(window.parent);
    $('scanBtn').disabled = false;
    $('queueBtn').disabled = false;
    $('modelBadge').textContent = 'Tilkoblet';
    setStatus('✅ Klar til å skanne.', 'ok');
  } catch(e) { 
    setStatus('❌ Kunne ikke koble til API.', 'error'); 
  }
}

function slaaSammen(props, nøkkel1, nøkkel2) {
    const val1 = props[nøkkel1] || props[nøkkel1.toLowerCase()];
    const val2 = props[nøkkel2] || props[nøkkel2.toLowerCase()];
    if (val1 && val2) return `${val1} - ${val2}`;
    if (val1) return val1;
    if (val2) return val2;
    return "Udefinert";
}

$('scanBtn').addEventListener('click', async () => {
  if (!API) return;
  $('scanBtn').disabled = true;
  $('mainContent').innerHTML = '';
  
  try {
    setStatus('⏳ Henter modeller fra vieweren...');
    const models = await API.viewer.getObjects();
    if (!models || models.length === 0) {
      setStatus('⚠️ Fant ingen objekter i vieweren.', 'warn');
      $('scanBtn').disabled = false;
      return;
    }

    const CHUNK = 200;
    let totalObjects = 0;
    let rdsTree = {}; 

    for (const model of models) {
      const mid = model.modelId || model.modelid;
      const objectIds = (model.objects || []).map(o => o.id || o.objectRuntimeId).filter(id => id != null);
      
      for (let i = 0; i < objectIds.length; i += CHUNK) {
        const chunk = objectIds.slice(i, i + CHUNK);
        setStatus(`⏳ Analyserer egenskaper og bygger tre... (${totalObjects + i} objekter skannet)`);
        const propsArr = await API.viewer.getObjectProperties(mid, chunk);
        
        propsArr.forEach(obj => {
          const flatProps = {};
          (obj.properties || []).forEach(pset => 
            (pset.properties || []).forEach(p => {
               if (p.value !== undefined && p.value !== null && String(p.value).trim() !== "") {
                   flatProps[p.name] = String(p.value).trim();
                   flatProps[p.name.toLowerCase()] = String(p.value).trim(); 
               }
            })
          );

          const nivå1 = flatProps["02. aaaaaa"] || "Udefinert 02. AAAAAA";
          const nivå2 = slaaSammen(flatProps, "03. bnn", "04. bnn navn");
          const nivå3 = slaaSammen(flatProps, "05. cnn", "06. cnn navn");
          const nivå4 = slaaSammen(flatProps, "07. dnn", "08. dnn navn");
          const nivå5 = slaaSammen(flatProps, "09. eennn", "10. eennn navn");
          const nivå6 = slaaSammen(flatProps, "11. fffnnn", "12. fffnnn navn");
          const nivå7 = slaaSammen(flatProps, "13. gggnnn", "14. gggnnn navn");
          const nivå8 = slaaSammen(flatProps, "15. hhhnnnnn", "16. hhhnnnnn navn");
          const nivå9 = flatProps["01. rds-tag"] || "Udefinert 01. RDS-tag";
          
          let objektNavn = flatProps["a006_objektnavn"] || flatProps["objekttype"] || obj.name || "Ukjent objekt";

          const harRDS = [nivå1, nivå2, nivå3, nivå4, nivå5, nivå6, nivå7, nivå8, nivå9].some(val => !val.includes("Udefinert"));
          if (!harRDS) return; 

          const sti = [nivå1, nivå2, nivå3, nivå4, nivå5, nivå6, nivå7, nivå8, nivå9];
          let gjeldendeNivå = rdsTree;
          
          sti.forEach((nodensNavn, indeks) => {
              if (!gjeldendeNivå[nodensNavn]) { gjeldendeNivå[nodensNavn] = { barn: {}, objekter: [] }; }
              if (indeks === sti.length - 1) {
                  gjeldendeNivå[nodensNavn].objekter.push({ navn: objektNavn, modelId: mid, runtimeId: obj.id || obj.objectRuntimeId });
              }
              gjeldendeNivå = gjeldendeNivå[nodensNavn].barn;
          });
        });
        totalObjects += chunk.length;
      }
    }

    tegnOppTre(rdsTree, $('mainContent'));
    setStatus(`✅ Tre bygget. Analyserte ${totalObjects} objekter.`, 'ok');
    $('scanBtn').disabled = false;

  } catch (error) {
    setStatus(`❌ Feil under skanning: ${error.message}`, 'error');
    $('scanBtn').disabled = false;
  }
});

const EGENSKAPER_SOM_SKAL_OPPDATERES = [
    "01. rds-tag", 
    "15. hhhnnnnn", 
    "16. hhhnnnnn navn"
];

function oppdaterUI() {
    const antall = EXPORT_QUEUE.length;
    $('exportBtn').innerText = `💾 Eksporter (${antall})`;
    $('exportBtn').disabled = antall === 0;
    $('clearBtn').disabled = antall === 0;
}

$('clearBtn').addEventListener('click', () => {
    EXPORT_QUEUE = [];
    oppdaterUI();
    setStatus('🗑️ Køen er tømt.', 'ok');
});

$('queueBtn').addEventListener('click', async () => {
    const newNumber = $('newRunningNumber').value.trim();
    if (!newNumber) {
        alert("Du må skrive inn et nytt løpenummer først.");
        return;
    }

    try {
        setStatus('⏳ Henter markering og forbereder data...');
        const selection = await API.viewer.getSelection();
        
        let totalSelected = 0;
        if (selection && selection.length > 0) {
            selection.forEach(sel => { if (sel.objectRuntimeIds) totalSelected += sel.objectRuntimeIds.length; });
        }

        if (totalSelected === 0) {
            setStatus('⚠️ Ingen objekter er markert i 3D-modellen.', 'warn');
            return;
        }

        let addedCount = 0;

        for (const sel of selection) {
            const mid = sel.modelId;
            const runtimeIds = sel.objectRuntimeIds; 
            if (!runtimeIds || runtimeIds.length === 0) continue;
            
            const propsArr = await API.viewer.getObjectProperties(mid, runtimeIds);
            
            propsArr.forEach(obj => {
                let globalId = "UKJENT_GUID";
                const objRuntimeId = obj.id || obj.objectRuntimeId;
                const flatProps = {}; 
                
                if (obj.externalId) globalId = obj.externalId;
                else if (obj.globalId) globalId = obj.globalId;
                else if (obj.ifcGuid) globalId = obj.ifcGuid;
                
                if (obj.properties) {
                    for (const pset of obj.properties) {
                        (pset.properties || []).forEach(p => {
                            if (p.name) {
                                const nameLower = p.name.trim().toLowerCase();
                                const valStr = p.value !== undefined && p.value !== null ? String(p.value).trim() : "";
                                
                                if (valStr !== "") flatProps[nameLower] = valStr;

                                // OPPDATERT: Søker nå også eksplisitt etter "objid"
                                if (nameLower.includes("guid") || nameLower.includes("globalid") || nameLower === "objid") {
                                    if (nameLower.includes("ifc") || nameLower === "globalid" || nameLower === "objid") {
                                        globalId = valStr;
                                    } else if (globalId === "UKJENT_GUID") {
                                        globalId = valStr;
                                    }
                                }
                            }
                        });
                    }
                }

                if (globalId === "UKJENT_GUID") {
                    console.warn(`⚠️ Fant ikke GUID/ObjID for objekt RuntimeID: ${objRuntimeId}. Her er all rådata for inspeksjon:`, obj);
                }

                EXPORT_QUEUE = EXPORT_QUEUE.filter(item => !(item.modelId === mid && item.runtimeId === objRuntimeId));

                const updateItem = {
                    GUID: globalId,
                    modelId: mid,
                    runtimeId: objRuntimeId,
                    gammelRdsTag: flatProps["01. rds-tag"] || "",
                    egenskaperSomSkalEndres: {}
                };

                EGENSKAPER_SOM_SKAL_OPPDATERES.forEach(propName => {
                    const gammelVerdi = flatProps[propName];
                    if (gammelVerdi) {
                        const nyVerdi = gammelVerdi.replace(/\d{1,3}$/, newNumber);
                        updateItem.egenskaperSomSkalEndres[propName] = nyVerdi;
                    }
                });

                if (Object.keys(updateItem.egenskaperSomSkalEndres).length > 0) {
                    EXPORT_QUEUE.push(updateItem);
                    addedCount++;
                }
            });
        }

        oppdaterUI();
        setStatus(`✅ La til ${addedCount} objekter i køen. Totalt: ${EXPORT_QUEUE.length}`, 'ok');

    } catch (error) {
        setStatus(`❌ Feil ved innhenting: ${error.message}`, 'error');
    }
});

$('exportBtn').addEventListener('click', () => {
    if (EXPORT_QUEUE.length === 0) return;
    try {
        const jsonString = JSON.stringify(EXPORT_QUEUE, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `rds_batch_update_flere.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus(`🎉 Eksporterte JSON-fil med ${EXPORT_QUEUE.length} endringer.`, 'ok');
    } catch (error) {
        setStatus(`❌ Feil under eksport: ${error.message}`, 'error');
    }
});

function tellObjekter(nodeMap) { let count = nodeMap.objekter.length; for (const key in nodeMap.barn) { count += tellObjekter(nodeMap.barn[key]); } return count; }
function hentAlleIds(nodeMap) { let idMap = {}; nodeMap.objekter.forEach(obj => { if (!idMap[obj.modelId]) idMap[obj.modelId] = []; idMap[obj.modelId].push(Number(obj.runtimeId)); }); for (const key in nodeMap.barn) { const barnIds = hentAlleIds(nodeMap.barn[key]); for (const mid in barnIds) { if (!idMap[mid]) idMap[mid] = []; idMap[mid].push(...barnIds[mid]); } } return idMap; }
function formaterForMarkering(idMap) { return Object.keys(idMap).map(mid => ({ modelId: mid, objectRuntimeIds: idMap[mid] })); }
function tegnOppTre(treStruktur, container, erRot = true) {
    const nøkler = Object.keys(treStruktur).sort();
    if (nøkler.length === 0 && erRot) { container.innerHTML = '<div class="empty anim">Fant ingen objekter med RDS-egenskaper.</div>'; return; }
    const wrapper = document.createElement('div');
    if (erRot) { wrapper.className = 'tree-container anim'; container.appendChild(wrapper); }
    nøkler.forEach(nøkkel => {
        const nodeData = treStruktur[nøkkel];
        const totaltAntall = tellObjekter(nodeData);
        if (totaltAntall === 0) return;
        const nodeDiv = document.createElement('div'); nodeDiv.className = erRot ? '' : 'tree-node';
        const headerDiv = document.createElement('div'); headerDiv.className = 'tree-header';
        const safeNøkkel = escapeHTML(nøkkel);
        headerDiv.innerHTML = `<div class="tree-arrow">▶</div><div class="tree-title" title="${safeNøkkel}">${safeNøkkel}</div><div class="tree-count">${totaltAntall} obj</div>`;
        const childrenDiv = document.createElement('div'); childrenDiv.className = 'tree-children';
        const alleIdsForMarkering = formaterForMarkering(hentAlleIds(nodeData));
        headerDiv.onclick = async (e) => {
            e.stopPropagation();
            const isOpen = childrenDiv.style.display === 'block'; childrenDiv.style.display = isOpen ? 'none' : 'block';
            headerDiv.querySelector('.tree-arrow').innerText = isOpen ? '▼' : '▶';
            try { if (API.viewer.setSelection && alleIdsForMarkering.length > 0) { await API.viewer.setSelection({ modelObjectIds: alleIdsForMarkering }, 'set'); } } catch(err) {}
        };
        if (Object.keys(nodeData.barn).length > 0) { tegnOppTre(nodeData.barn, childrenDiv, false); }
        if (nodeData.objekter.length > 0) {
            nodeData.objekter.sort((a, b) => a.navn.localeCompare(b.navn)).forEach(obj => {
                const objDiv = document.createElement('div'); objDiv.className = 'tree-object'; objDiv.innerText = obj.navn; objDiv.title = obj.navn;
                objDiv.onclick = async (e) => { e.stopPropagation(); try { if (API.viewer.setSelection) { await API.viewer.setSelection({ modelObjectIds: [{ modelId: obj.modelId, objectRuntimeIds: [Number(obj.runtimeId)] }] }, 'set'); } } catch(err) {} };
                childrenDiv.appendChild(objDiv);
            });
        }
        nodeDiv.appendChild(headerDiv); nodeDiv.appendChild(childrenDiv); (erRot ? wrapper : container).appendChild(nodeDiv);
    });
}

connect();
</script>
</body>
</html>
