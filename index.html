<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8"/>
  <title>RDS Universal Editor v3.32</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
  <style>
    /* (CSS beholdes som før, lagt inn for komplett fil) */
    :root { --blue: #1d4ed8; --bg: #f3f4f6; --ink: #111827; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
    .topbar { padding: 10px; background: white; border-bottom: 1px solid #ccc; display: flex; gap: 10px; align-items: center; }
    #mainContent { flex: 1; overflow-y: auto; padding: 10px; }
    .btn { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; background: var(--blue); color: white; }
  </style>
</head>
<body>

<header class="topbar">
  <b>RDS Editor v3.32</b>
  <button class="btn" id="scanSelBtn">▶ Bygg tre</button>
  <button class="btn" id="exportBtn">💾 Eksporter (0)</button>
</header>

<main id="mainContent">
  <div id="status">Venter...</div>
</main>

<script>
let API = null;
let EXPORT_QUEUE = [];
const $ = id => document.getElementById(id);

async function connect(){
  API = await window.TrimbleConnectWorkspace.connect(window.parent);
  $('scanSelBtn').disabled = false;
  $('status').innerText = "✅ Tilkoblet";
}

// DENNE FUNKSJONEN FINNER NÅ GUID UANSETT HVOR DEN LIGGER
function extractGuid(obj) {
    // 1. Sjekk alle Psets (inkludert system-psets som "2_RDS" eller "Reference Object")
    if (obj.properties) {
        for (const pset of obj.properties) {
            for (const p of (pset.properties || [])) {
                if (!p.name || p.value === undefined) continue;
                
                const val = String(p.value).trim();
                
                // Sjekk om verdien inneholder "id. " slik som i bildet ditt
                if (val.startsWith("id. ")) {
                    return val.replace("id. ", "");
                }
                
                // Sjekk om navnet er eksplisitt GUID
                const name = String(p.name).trim().toLowerCase();
                if (name === "guid (ifc)" || name === "globalid") {
                    return val;
                }
            }
        }
    }
    return obj.externalId || "UKJENT_GUID";
}

async function kjorSkanner() {
    const selection = await API.viewer.getSelection();
    EXPORT_QUEUE = [];
    
    for (const sel of selection) {
        const propsArr = await API.viewer.getObjectProperties(sel.modelId, sel.objectRuntimeIds);
        
        propsArr.forEach((obj, idx) => {
            const guid = extractGuid(obj); // Bruker den nye jegeren
            const rid = obj.id || obj.objectRuntimeId || sel.objectRuntimeIds[idx];
            
            // Lagre i køen
            EXPORT_QUEUE.push({
                GUID: guid,
                modelId: sel.modelId,
                runtimeId: rid,
                egenskaperSomSkalEndres: { "PNS Navn": "Midtskog" } // Eksempel
            });
        });
    }
    
    $('exportBtn').innerText = `💾 Eksporter (${EXPORT_QUEUE.length})`;
    $('status').innerText = `✅ Fant ${EXPORT_QUEUE.length} objekter med GUID: ${EXPORT_QUEUE[0].GUID}`;
}

$('scanSelBtn').addEventListener('click', kjorSkanner);
$('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(EXPORT_QUEUE, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "update-properties.json";
    a.click();
});

connect();
</script>
</body>
</html>
